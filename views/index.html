<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - App Setup Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">App Setup Portal</a>
            <div class="d-flex align-items-center">
                <a href="/new" class="btn btn-light me-3">
                    <i class="bi bi-plus-lg"></i> New Request
                </a>
                <button id="logoutBtn" class="btn btn-outline-light">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col">
                <h3>App Setup Requests</h3>
            </div>
        </div>

        <!-- Filters -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Environment</label>
                        <select id="filterEnv" class="form-select">
                            <option value="">All Environments</option>
                            <option value="development">Development</option>
                            <option value="qa">QA</option>
                            <option value="staging">Staging</option>
                            <option value="production">Production</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Status</label>
                        <select id="filterStatus" class="form-select">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="approved">Approved</option>
                            <option value="completed">Completed</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Search</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by app name...">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button id="clearFilters" class="btn btn-outline-secondary w-100">Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Requests Table -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>App Name</th>
                                <th>Environment</th>
                                <th>Requested By</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="requestsTable">
                            <tr id="loadingRow">
                                <td colspan="6" class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-inbox display-1 text-muted"></i>
            <h4 class="mt-3">No requests found</h4>
            <p class="text-muted">Create a new app setup request to get started.</p>
            <a href="/new" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> New Request
            </a>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this request?</p>
                    <p class="text-muted mb-0" id="deleteAppName"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDelete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        let allRequests = [];
        let deleteId = null;

        // Load requests on page load
        document.addEventListener('DOMContentLoaded', loadRequests);

        async function loadRequests() {
            try {
                const res = await fetch('/api/requests');
                if (res.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                allRequests = await res.json();
                renderRequests();
            } catch (err) {
                console.error('Failed to load requests:', err);
            }
        }

        function renderRequests() {
            const tbody = document.getElementById('requestsTable');
            const emptyState = document.getElementById('emptyState');

            // Apply filters
            const envFilter = document.getElementById('filterEnv').value;
            const statusFilter = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allRequests.filter(req => {
                if (envFilter && req.environment !== envFilter) return false;
                if (statusFilter && req.status !== statusFilter) return false;
                if (search && !req.appName?.toLowerCase().includes(search)) return false;
                return true;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('d-none');
                return;
            }

            emptyState.classList.add('d-none');
            tbody.innerHTML = filtered.map(req => `
                <tr>
                    <td>
                        <strong>${escapeHtml(req.appName || 'Unnamed')}</strong>
                    </td>
                    <td>
                        <span class="badge bg-${getEnvColor(req.environment)}">${escapeHtml(req.environment || 'N/A')}</span>
                    </td>
                    <td>${escapeHtml(req.requestedBy || 'N/A')}</td>
                    <td>${formatDate(req.createdAt)}</td>
                    <td>
                        <span class="badge bg-${getStatusColor(req.status)}">${escapeHtml(req.status || 'pending')}</span>
                    </td>
                    <td class="text-end">
                        <div class="btn-group btn-group-sm">
                            <a href="/view/${req.id}" class="btn btn-outline-primary" title="View">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a href="/edit/${req.id}" class="btn btn-outline-secondary" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button class="btn btn-outline-danger" title="Delete" onclick="showDeleteModal('${req.id}', '${escapeHtml(req.appName || 'Unnamed')}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getEnvColor(env) {
            const colors = {
                development: 'info',
                qa: 'warning',
                staging: 'secondary',
                production: 'danger'
            };
            return colors[env] || 'secondary';
        }

        function getStatusColor(status) {
            const colors = {
                pending: 'warning',
                approved: 'info',
                completed: 'success',
                rejected: 'danger'
            };
            return colors[status] || 'secondary';
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleDateString();
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Filter event listeners
        document.getElementById('filterEnv').addEventListener('change', renderRequests);
        document.getElementById('filterStatus').addEventListener('change', renderRequests);
        document.getElementById('searchInput').addEventListener('input', renderRequests);
        document.getElementById('clearFilters').addEventListener('click', () => {
            document.getElementById('filterEnv').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('searchInput').value = '';
            renderRequests();
        });

        // Delete functionality
        function showDeleteModal(id, name) {
            deleteId = id;
            document.getElementById('deleteAppName').textContent = name;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }

        document.getElementById('confirmDelete').addEventListener('click', async () => {
            if (!deleteId) return;
            try {
                await fetch(`/api/requests/${deleteId}`, { method: 'DELETE' });
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                loadRequests();
            } catch (err) {
                console.error('Failed to delete:', err);
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        });
    </script>
</body>
</html>
